name: User Story
description: Player-facing story for one bounded gameplay, UX, or tooling outcome.
title: "Story: "
body:
  - type: textarea
    id: story
    attributes:
      label: User Story
      description: Write the story in player or developer value form.
      placeholder: |
        As a player,
        I want ...
        so that ...
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the concrete change this story should deliver.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Simulation
        - Buildings
        - Adventurers
        - Quests
        - UI
        - Save/Load
        - Tests
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P0
        - P1
        - P2
    validations:
      required: true
  - type: dropdown
    id: size
    attributes:
      label: Size
      options:
        - XS
        - S
        - M
        - L
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: |
        - Player-visible behavior is complete
        - Tests added or updated
        - No regressions in the current playable loop
    validations:
      required: true
